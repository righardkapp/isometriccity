<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Isometric City</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #ffffff;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
  }
  canvas { display: block; cursor: none; }
  #hint {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(80, 80, 80, 0.3);
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    font-family: 'Courier New', monospace;
    pointer-events: none;
    animation: fadeHint 4s ease forwards 2s;
  }
  @keyframes fadeHint { 0%{opacity:1} 100%{opacity:0} }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">move cursor to build the city</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H;

// Tighter grid
const TILE_W = 34;
const TILE_H = 17;

let mouse = { x: -9999, y: -9999 };
const RADIUS = 6;
const MAX_HEIGHT = 88;

const cellMap = new Map();

function getCell(c, r) {
  const key = c + ',' + r;
  if (!cellMap.has(key)) {
    const fw = 0.42 + Math.random() * 0.40; // footprint width scale
    const fd = 0.42 + Math.random() * 0.40; // footprint depth scale
    cellMap.set(key, {
      height: 0,
      targetHeight: 0,
      randomMax: Math.floor(Math.random() * MAX_HEIGHT) + 14,
      fw, fd,
      tint: Math.random() * 6 - 3,
      speed: 0.07 + Math.random() * 0.06,
    });
  }
  return cellMap.get(key);
}

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}

function isoProject(col, row) {
  const ox = W / 2;
  const oy = H * 0.84;
  return {
    x: ox + (col - row) * (TILE_W / 2),
    y: oy + (col + row) * (TILE_H / 2),
  };
}

function screenToGrid(sx, sy) {
  const ox = W / 2, oy = H * 0.84;
  const dx = sx - ox, dy = sy - oy;
  return {
    col: (dx / (TILE_W / 2) + dy / (TILE_H / 2)) / 2,
    row: (dy / (TILE_H / 2) - dx / (TILE_W / 2)) / 2,
  };
}

function getVisibleRange() {
  const pts = [
    screenToGrid(0,0), screenToGrid(W,0),
    screenToGrid(0,H), screenToGrid(W,H),
    screenToGrid(W/2,0),
  ];
  let minC=Infinity,maxC=-Infinity,minR=Infinity,maxR=-Infinity;
  for (const p of pts) {
    minC=Math.min(minC,p.col); maxC=Math.max(maxC,p.col);
    minR=Math.min(minR,p.row); maxR=Math.max(maxR,p.row);
  }
  const pad = RADIUS + 8;
  return { c0:Math.floor(minC)-pad, c1:Math.ceil(maxC)+pad, r0:Math.floor(minR)-pad, r1:Math.ceil(maxR)+pad };
}

function updateTargets(range) {
  const gm = screenToGrid(mouse.x, mouse.y);
  for (let r = range.r0; r <= range.r1; r++) {
    for (let c = range.c0; c <= range.c1; c++) {
      const cell = getCell(c, r);
      const dist = Math.sqrt((c-gm.col)**2 + (r-gm.row)**2);
      if (dist < RADIUS) {
        cell.targetHeight = cell.randomMax;
      } else if (dist < RADIUS + 3) {
        const t = 1 - (dist - RADIUS) / 3;
        cell.targetHeight = cell.randomMax * t * t * t;
      } else {
        cell.targetHeight = 0;
      }
    }
  }
}

function animateCells(range) {
  for (let r = range.r0; r <= range.r1; r++) {
    for (let c = range.c0; c <= range.c1; c++) {
      const cell = getCell(c, r);
      cell.height += (cell.targetHeight - cell.height) * cell.speed;
      if (Math.abs(cell.height - cell.targetHeight) < 0.2) cell.height = cell.targetHeight;
    }
  }
}

function lerp(a, b, t) { return a + (b - a) * Math.min(1, Math.max(0, t)); }
function clamp(v) { return Math.min(255, Math.max(0, v | 0)); }

function depthFade(screenY) {
  return 0;
}

// Clay render palette — ultra-subtle, all near-white
// Three faces barely distinguished, like diffuse light on matte white clay
function clayColors(h, tint, fade) {
  const hr = Math.min(1, h / MAX_HEIGHT);

  // All faces are very close to white; shadow is just a whisper
  const topV   = lerp(252, 255, hr);
  const rightV = lerp(238, 250, hr) + tint * 0.1;
  const leftV  = lerp(228, 244, hr) + tint * 0.08;

  function rgb(v, rb, gb, bb) {
    return 'rgb(' +
      clamp(lerp(v+rb, 255, fade)) + ',' +
      clamp(lerp(v+gb, 255, fade)) + ',' +
      clamp(lerp(v+bb, 255, fade)) + ')';
  }

  const strokeA = lerp(0.0, 0.10, hr) * (1 - fade * 0.92);

  return {
    top:    rgb(topV,    0, -1, -1),
    right:  rgb(rightV,  0, -1, -2),
    left:   rgb(leftV,  -1, -2, -3),
    stroke: 'rgba(170,165,160,' + strokeA + ')',
  };
}

function drawTile(col, row, h) {
  const { x, y } = isoProject(col, row);
  const fade = depthFade(y);
  if (fade >= 0.97) return;

  const tw = TILE_W, th = TILE_H;

  // Ground diamond — pure white with the faintest edge line
  ctx.beginPath();
  ctx.moveTo(x,         y);
  ctx.lineTo(x+tw/2,    y+th/2);
  ctx.lineTo(x,         y+th);
  ctx.lineTo(x-tw/2,    y+th/2);
  ctx.closePath();
  ctx.fillStyle = 'rgba(255,255,255,' + ((1-fade)*0.96) + ')';
  ctx.fill();
  ctx.strokeStyle = 'rgba(205,202,198,' + ((1-fade)*0.18) + ')';
  ctx.lineWidth = 0.5;
  ctx.stroke();

  if (h < 0.8) return;

  const cell = getCell(col, row);
  const fw = cell.fw, fd = cell.fd;

  // Building footprint centred on tile, scaled by fw/fd
  const cx = x, cy = y + th / 2;
  const p0 = { x: cx,             y: cy - (th/2)*fd }; // back
  const p1 = { x: cx + (tw/2)*fw, y: cy             }; // right
  const p2 = { x: cx,             y: cy + (th/2)*fd }; // front
  const p3 = { x: cx - (tw/2)*fw, y: cy             }; // left

  const colors = clayColors(h, cell.tint, fade);

  // Top face
  ctx.beginPath();
  ctx.moveTo(p0.x, p0.y - h);
  ctx.lineTo(p1.x, p1.y - h);
  ctx.lineTo(p2.x, p2.y - h);
  ctx.lineTo(p3.x, p3.y - h);
  ctx.closePath();
  ctx.fillStyle = colors.top;
  ctx.fill();
  ctx.strokeStyle = colors.stroke;
  ctx.lineWidth = 0.4;
  ctx.stroke();

  // Left face (p3 → p2 down)
  ctx.beginPath();
  ctx.moveTo(p3.x, p3.y - h);
  ctx.lineTo(p2.x, p2.y - h);
  ctx.lineTo(p2.x, p2.y);
  ctx.lineTo(p3.x, p3.y);
  ctx.closePath();
  ctx.fillStyle = colors.left;
  ctx.fill();
  ctx.strokeStyle = colors.stroke;
  ctx.stroke();

  // Right face (p1 → p2 down)
  ctx.beginPath();
  ctx.moveTo(p1.x, p1.y - h);
  ctx.lineTo(p2.x, p2.y - h);
  ctx.lineTo(p2.x, p2.y);
  ctx.lineTo(p1.x, p1.y);
  ctx.closePath();
  ctx.fillStyle = colors.right;
  ctx.fill();
  ctx.strokeStyle = colors.stroke;
  ctx.stroke();
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, W, H);

  const range = getVisibleRange();
  for (let r = range.r0; r <= range.r1; r++) {
    for (let c = range.c0; c <= range.c1; c++) {
      drawTile(c, r, getCell(c, r).height);
    }
  }



  // Cursor
  if (mouse.x > 0) {
    const grd = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, 40);
    grd.addColorStop(0, 'rgba(50,48,44,0.05)');
    grd.addColorStop(1, 'rgba(50,48,44,0)');
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.arc(mouse.x, mouse.y, 40, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(mouse.x, mouse.y, 1.8, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(100,95,90,0.4)';
    ctx.fill();
  }
}

function loop() {
  const range = getVisibleRange();
  updateTargets(range);
  animateCells(range);
  draw();
  requestAnimationFrame(loop);
}

window.addEventListener('resize', resize);
window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
window.addEventListener('mouseleave', () => { mouse.x = -9999; mouse.y = -9999; });

resize();
loop();
</script>
</body>
</html>
